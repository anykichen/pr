name: Build print-agent.exe

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pywin32 pystray pillow pyinstaller

      - name: Build exe
        run: |
          pyinstaller --onefile --windowed --name=print-agent print_agent.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: print-agent-exe
          path: dist/print-agent.exe
