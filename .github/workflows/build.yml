name: Build EXE

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install pkg
        run: npm install -g pkg

      - name: Build executable
        run: pkg print-agent.js --targets node18-win-x64 --output print-agent.exe

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: print-agent.exe
